<!doctype html>
<html lang="es" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="description" content="BotiLocal — digital menu для ресторанів і барів. Скануй QR, дивись меню, замовляй." />
    <!-- Власний language switcher — Google Translate НЕ повинен втручатись:
         він ламав бренд-назви ("Велика Британія" замість "UK"), назви страв
         ("Як звати людину?" замість "Nachos & Cheese Dip"), і коди мов
         у dropdown ("IC" замість "ES"). Подвійна страховка:
         <meta name="google" content="notranslate"> + <html translate="no">. -->
    <meta name="google" content="notranslate" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <title>BotiLocal · Digital Menu</title>
    <!-- Runtime config (Supabase URL / anon key) інжектиться CI на etапі deploy.
         Абсолютний шлях обов'язковий — деплой під /BotiLocal/, а SPA-роути
         типу /menu/paddys іншому б ламали резолв. -->
    <script src="/BotiLocal/config.js"></script>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
