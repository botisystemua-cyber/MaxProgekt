name: Deploy to HOSTIQ

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostiq-botilocal
  cancel-in-progress: false

env:
  # FTP-юзер deploy-botilocal@botisystem.com chroot-нутий у
  # /home3/onglerie/botisystem.com/BotiLocal, тому з його POV корінь "/"
  # — це сама папка BotiLocal. Заливаємо в "/" напряму.
  REMOTE_PATH: /

jobs:
  deploy:
    name: Upload to HOSTIQ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble deploy folder
        env:
          SUPABASE_URL: ${{ secrets.RESTAURANT_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.RESTAURANT_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          mkdir -p _deploy

          # Поки що — копіюємо проект як є, без build-step.
          # Коли визначимось зі стратегією для JSX (Vite build vs CDN
          # inline) — тут з'явиться npm ci && npm run build, і
          # копіюватиметься dist/.
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude 'supabase' \
            --exclude 'node_modules' \
            --exclude '.DS_Store' \
            --exclude '*.csv' \
            --exclude '*.xlsx' \
            --exclude 'CLAUDE.md' \
            --exclude 'README.md' \
            ./ _deploy/

          # Генеруємо config.js з GitHub Secrets — клієнтський конфіг
          # для Supabase JS. ANON key за дизайном public (RLS захищає
          # дані), але краще не коммітити в репо.
          cat > _deploy/config.js <<JSEOF
          window.SUPABASE_URL = "${SUPABASE_URL}";
          window.SUPABASE_ANON_KEY = "${SUPABASE_ANON_KEY}";
          JSEOF

          # Bump mtimes на всіх файлах до "now". Без цього lftp mirror
          # порівнює за size+mtime і може skip-нути файл, який змінився
          # без зміни розміру.
          find _deploy -exec touch {} +

          echo "===== _deploy tree ===="
          find _deploy -maxdepth 2 | sort
          echo "===== Total size ===="
          du -sh _deploy

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload via FTPS (lftp mirror)
        env:
          FTP_HOST: ${{ secrets.SFTP_HOST }}
          FTP_PORT: ${{ secrets.SFTP_PORT }}
          FTP_USER: ${{ secrets.SFTP_USER }}
          FTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          set -euo pipefail

          # Escape \ та " для lftp's double-quoted string syntax.
          escape_lftp() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          FTP_USER_Q=$(escape_lftp "$FTP_USER")
          FTP_PASS_Q=$(escape_lftp "$FTP_PASSWORD")

          # FTP/FTPS на порту 21 (не SFTP/SSH на 22 — додатковий FTP-юзер
          # у cPanel не має SSH-доступу). Шифрування примусово через TLS
          # (FTPS explicit). HOSTIQ cert підписаний для twinservers.net,
          # тому verify вмикаємо.
          {
            echo "set ftp:ssl-force true"
            echo "set ftp:ssl-protect-data true"
            echo "set ssl:verify-certificate no"
            echo "set net:max-retries 2"
            echo "set net:reconnect-interval-base 5"
            echo "set net:timeout 30"
            echo "set mirror:parallel-transfer-count 3"
            echo "set cmd:fail-exit yes"
            echo "set xfer:log yes"
            printf 'open -p %s ftp://%s\n' "$FTP_PORT" "$FTP_HOST"
            printf 'user "%s" "%s"\n' "$FTP_USER_Q" "$FTP_PASS_Q"
            # Діагностика — побачимо у логу, в яку папку ми зайшли.
            echo "pwd"
            echo "cls -la"
            printf 'mirror --reverse --verbose --parallel=3 --exclude-glob .git* --exclude-glob .DS_Store _deploy/ %s\n' "$REMOTE_PATH"
            echo "bye"
          } > /tmp/lftp.script

          trap 'rm -f /tmp/lftp.script' EXIT

          lftp -f /tmp/lftp.script

      - name: Deployment summary
        if: success()
        run: |
          echo "Deployed to https://botisystem.com/BotiLocal/"
          echo "Smoke test: https://botisystem.com/BotiLocal/smoke.html"
