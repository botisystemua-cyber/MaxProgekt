name: Deploy to HOSTIQ

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostiq-botilocal
  cancel-in-progress: false

env:
  SFTP_REMOTE_PATH: /BotiLocal

jobs:
  deploy:
    name: Upload to HOSTIQ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble deploy folder
        env:
          SUPABASE_URL: ${{ secrets.RESTAURANT_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.RESTAURANT_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          mkdir -p _deploy

          # Поки що — копіюємо проект як є, без build-step.
          # Коли визначимось зі стратегією для JSX (Vite build vs CDN
          # inline) — тут з'явиться npm ci && npm run build, і
          # копіюватиметься dist/.
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude 'supabase' \
            --exclude 'node_modules' \
            --exclude '.DS_Store' \
            --exclude '*.csv' \
            --exclude '*.xlsx' \
            --exclude 'CLAUDE.md' \
            --exclude 'README.md' \
            ./ _deploy/

          # Генеруємо config.js з GitHub Secrets — клієнтський конфіг
          # для Supabase JS. ANON key за дизайном public (RLS захищає
          # дані), але краще не коммітити в репо.
          cat > _deploy/config.js <<JSEOF
          window.SUPABASE_URL = "${SUPABASE_URL}";
          window.SUPABASE_ANON_KEY = "${SUPABASE_ANON_KEY}";
          JSEOF

          # Bump mtimes на всіх файлах до "now". Без цього lftp mirror
          # порівнює за size+mtime і може skip-нути файл, який змінився
          # без зміни розміру (той самий трюк, що в BotiLogistics-v1.0).
          find _deploy -exec touch {} +

          echo "===== _deploy tree ===="
          find _deploy -maxdepth 2 | sort
          echo "===== Total size ===="
          du -sh _deploy

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload via SFTP (lftp mirror)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          set -euo pipefail

          # Escape \ та " для lftp's double-quoted string syntax.
          escape_lftp() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          SFTP_USER_Q=$(escape_lftp "$SFTP_USER")
          SFTP_PASS_Q=$(escape_lftp "$SFTP_PASSWORD")

          {
            echo "set sftp:auto-confirm yes"
            echo "set net:max-retries 3"
            echo "set net:reconnect-interval-base 5"
            echo "set net:timeout 30"
            echo "set mirror:parallel-transfer-count 3"
            echo "set cmd:fail-exit yes"
            printf 'open sftp://%s:%s\n' "$SFTP_HOST" "$SFTP_PORT"
            printf 'user "%s" "%s"\n' "$SFTP_USER_Q" "$SFTP_PASS_Q"
            # FTP-юзер deploy-botilocal зачейнджрутений у
            # /home3/onglerie/botisystem.com/BotiLocal, тому віддалений
            # шлях відносно його home = просто /.
            printf 'mirror --reverse --verbose --parallel=3 --exclude-glob .git* --exclude-glob .DS_Store _deploy/ %s/\n' "$SFTP_REMOTE_PATH"
            echo "bye"
          } > /tmp/lftp.script

          trap 'rm -f /tmp/lftp.script' EXIT

          lftp -f /tmp/lftp.script

      - name: Deployment summary
        if: success()
        run: |
          echo "Deployed to https://botisystem.com/BotiLocal/"
          echo "Smoke test: https://botisystem.com/BotiLocal/smoke.html"
