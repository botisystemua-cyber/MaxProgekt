name: Deploy BotiRestaurant to HOSTIQ

on:
  push:
    branches:
      - main
    paths:
      - 'boti-restaurant/**'
      - '.github/workflows/boti-restaurant-deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-boti-restaurant
  cancel-in-progress: false

env:
  SFTP_REMOTE_PATH: /home3/onglerie/botisystem.com/BotiRestaurant-v1.0

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        app: [menu-client, menu-admin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject Supabase env
        working-directory: boti-restaurant/${{ matrix.app }}
        run: |
          {
            echo "VITE_SUPABASE_URL=${{ secrets.RESTAURANT_SUPABASE_URL }}"
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.RESTAURANT_SUPABASE_ANON_KEY }}"
          } > .env.production

      - name: Install dependencies
        working-directory: boti-restaurant/${{ matrix.app }}
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: boti-restaurant/${{ matrix.app }}
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: boti-restaurant/${{ matrix.app }}/dist
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Assemble & upload to HOSTIQ
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Assemble deploy folder
        run: |
          set -euo pipefail

          mkdir -p _deploy
          for app in menu-client menu-admin; do
            mkdir -p "_deploy/$app"
            cp -a "_artifacts/${app}-dist/." "_deploy/$app/"
          done

          # Bump mtimes — same trick as BotiLogistics deploy. lftp mirror
          # порівнює size+mtime; якщо новий index.html має такий же розмір
          # як старий на сервері, але mtime артефакту старший — mirror
          # вирішить "свіже" і не перезапише. Без цього touch регресія.
          find _deploy -exec touch {} +

          echo "===== _deploy tree ====="
          find _deploy -maxdepth 2 -type d | sort
          echo "===== Total size ====="
          du -sh _deploy

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload via SFTP (lftp mirror)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          set -euo pipefail

          escape_lftp() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          SFTP_USER_Q=$(escape_lftp "$SFTP_USER")
          SFTP_PASS_Q=$(escape_lftp "$SFTP_PASSWORD")

          {
            echo "set sftp:auto-confirm yes"
            echo "set net:max-retries 3"
            echo "set net:reconnect-interval-base 5"
            echo "set net:timeout 30"
            echo "set mirror:parallel-transfer-count 3"
            echo "set cmd:fail-exit yes"
            printf 'open sftp://%s:%s\n' "$SFTP_HOST" "$SFTP_PORT"
            printf 'user "%s" "%s"\n' "$SFTP_USER_Q" "$SFTP_PASS_Q"
            printf 'mirror --reverse --verbose --parallel=3 --exclude-glob .git* --exclude-glob .DS_Store --exclude-glob node_modules/ _deploy/ %s/\n' "$SFTP_REMOTE_PATH"
            echo "bye"
          } > /tmp/lftp.script

          trap 'rm -f /tmp/lftp.script' EXIT

          lftp -f /tmp/lftp.script

      - name: Deployment summary
        if: success()
        run: |
          echo "Deployed to https://botisystem.com/BotiRestaurant-v1.0/"
          echo "  • Menu (guests):  /menu-client/"
          echo "  • Admin:          /menu-admin/"
          echo "Target path: ${{ env.SFTP_REMOTE_PATH }}"
